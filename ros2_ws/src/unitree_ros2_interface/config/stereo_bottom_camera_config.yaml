/**:
   ros__parameters:
      namespace: "unitree_go1"
      camera_name: "bottom_camera"   
      device_index: 0            # Device index for /dev/videoX      
      raw_width: 1856                  # Image raw width 
      raw_height: 800                  # Image raw height
      raw_fps: 30.0                    # Image raw fps  
      
      # Layout stereo: only for now side_by_side
      stereo_layout: "side_by_side"
      swap_lr: true
      
      # Format required (fourcc)
      pixel_format: "MJPG"             # "MJPG" | "YUYV"
      force_v4l2: true
      buffer_size: 4
      warmup_frames: 5
      # Optional: explicit device path (e.g. /dev/video0). Overrides device_index when non-empty.
      device_path: ""
      # CAP_PROP_CONVERT_RGB: true = OpenCV converts raw frames to BGR (default).
      # Set false only to receive native pixel data (e.g. YUYV raw).
      convert_rgb: true
      encoding: "bgr8"                 # Encoding for published images "bgr8" | "mono8" | "rgb8"

      # frame_id to put in the headers
      left_frame_id: "unitree_go1/bottom_camera_left_optical"
      right_frame_id: "unitree_go1/bottom_camera_right_optical"

      # CameraInfo YAML Names inside the config folder
      camera_info_left_name: "bottom_camera_left.yaml" 
      camera_info_right_name: "bottom_camera_right.yaml"

      use_image_transport: false   # Use image_transport for publishing images
      publish_mono: false           # Publish also mono images
      
      # Rectification
      publish_rectified_color: false  # Publish rectified color images
      publish_rectified_mono: false   # Publish rectified mono images
      use_image_transport_rectified: false  # Use image_transport for publishing rectified images

      # OpenCV debug/forzature (env vars impostate dal nodo)
      opencv:
         priority_list: "V4L2"     # OPENCV_VIDEOIO_PRIORITY_LIST
         videoio_debug: false      # OPENCV_VIDEOIO_DEBUG
         log_level: "INFO"         # OPENCV_LOG_LEVEL (es: "DEBUG", "INFO", "WARN", "ERROR")
         disable_opencl: true
      
      # V4L2 controls (opzionali). Metti -1 per “non toccare”.
      v4l2:
         exposure_auto: -1         # tipico: 1=manual, 3=aperture priority (dipende dal device)
         exposure_absolute: -1
         gain: -1
         brightness: -1
         contrast: -1
         saturation: -1
         sharpness: -1
         gamma: -1
         white_balance_temperature_auto: -1
         white_balance_temperature: -1
         power_line_frequency: -1
         backlight_compensation: -1         